<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Static LLM Navigator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <input class="omnibox" placeholder="Search or enter URL…" />
    </header>

    <aside class="sidebar">
      <h2>Tabs</h2>
      <ul class="tab-list">
        <li class="tab active">Example.com</li>
        <li class="tab">GitHub</li>
      </ul>
    </aside>

    <div class="resizer resizer-sidebar"></div>

    <main class="content">
      <iframe class="webview" src="https://example.com"></iframe>
    </main>

    <div class="resizer resizer-agent"></div>

    <section class="agent">
      <div class="agent-header">
        Agent
        <span class="pill" id="modelStatus">Loading…</span>
      </div>
      <div class="agent-messages" id="messages"></div>
      <input class="agent-input" id="agentInput" placeholder="Ask the agent…" />
    </section>

    <footer class="statusbar" id="statusbar">Ready.</footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
